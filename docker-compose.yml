services:
  db:
    image: postgres:16
    container_name: planner_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: planner_dev
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5433:5432"
    volumes:
      - planner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Planner: Host=db;Port=5432;Database=planner_dev;Username=planner;Password=planner
    restart: "no"

volumes:
  planner_postgres_data:
