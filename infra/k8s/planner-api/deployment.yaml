apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-api
  namespace: brightroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner-api
  template:
    metadata:
      labels:
        app: planner-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/mbright77/planner-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: planner-api-config
            - secretRef:
                name: planner-api-secrets
          readinessProbe:
            httpGet:
              path: /planner-api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /planner-api/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
