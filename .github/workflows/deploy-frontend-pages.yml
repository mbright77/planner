name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-frontend-pages.yml'
      - 'apps/web/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-deploy-enabled:
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment toggle state
        run: |
          if [ "${{ vars.RUN_DEPLOY }}" = "true" ]; then
            echo "GitHub Pages deployment is enabled."
          else
            echo "GitHub Pages deployment is disabled because RUN_DEPLOY is not set to 'true'."
          fi

  build:
    needs: check-deploy-enabled
    if: ${{ vars.RUN_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter @planner/web test

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
          VITE_APP_BASE_PATH: ${{ vars.FRONTEND_APP_BASE_PATH }}
        run: pnpm --filter @planner/web build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    if: ${{ vars.RUN_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
